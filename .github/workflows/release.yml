name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and commit binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build all architectures in Docker
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y%m%d)
          VERSION="kkkgo/mosdns:mini-ppdns ${BUILD_DATE} ${GIT_HASH}"

          build_one() {
            local GOARCH=$1
            local GOARM=$2
            local GOMIPS=$3
            local UNAME_M=$4

            echo "=== Building ${UNAME_M} ==="
            docker run --rm \
              -v "$(pwd)":/src \
              -w /src \
              -e GOOS=linux \
              -e GOARCH="${GOARCH}" \
              -e GOARM="${GOARM}" \
              -e GOMIPS="${GOMIPS}" \
              -e CGO_ENABLED=0 \
              golang:alpine \
              go build \
                -trimpath \
                -ldflags="-s -w -X 'main.version=${VERSION}'" \
                -o "release/mini-ppdns_${UNAME_M}" \
                .

            cp "release/mini-ppdns_${UNAME_M}" "release/mini-ppdns_${UNAME_M}_upx"
          }

          build_one amd64    ""  ""          x86_64
          build_one arm64    ""  ""          aarch64
          build_one arm      7   ""          armv7l
          build_one arm      6   ""          armv6l
          build_one mips     ""  softfloat   mips
          build_one mipsle   ""  softfloat   mipsel
          build_one mips64   ""  ""          mips64
          build_one mips64le ""  ""          mips64el
          build_one 386      ""  ""          i686
          build_one riscv64  ""  ""          riscv64

      - name: Install UPX
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Compress all _upx binaries
        run: |
          for f in release/*_upx; do
            echo "Compressing $f ..."
            upx --best --lzma "$f" || true
          done

      - name: Commit binaries to release/
        uses: EndBug/add-and-commit@v9
        with:
          add: 'release/'
          message: 'release: ${{ github.ref_name }}'
          author_name: Github Actions
          author_email: actions@github.com
          committer_email: actions@github.com
          push: true
