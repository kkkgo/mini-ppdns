name: Update deps
on:
  schedule:
    - cron: '30 01 * * 2' # 01:30 UTC every Tuesday (same as the Go workflow)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Update dependencies
        run: cargo update --verbose

      - name: Verify (fmt / clippy / test / build)
        run: |
          cargo fmt --all -- --check
          cargo clippy --all-targets -- -D warnings
          cargo test --all
          cargo build --release

      - name: Commit updated lockfile
        uses: EndBug/add-and-commit@main
        with:
          author_name: Github Actions
          author_email: actions@github.com
          committer_email: actions@github.com
          message: 'Update dependencies (cargo update)'
          add: Cargo.lock
